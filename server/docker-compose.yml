services:
  api:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PGSSLROOTCERT: ${PGSSLROOTCERT:-}
      PGSSLSERVERNAME: ${PGSSLSERVERNAME:-}
      NETWORK_PRESET: ${NETWORK_PRESET:-mainnet}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
