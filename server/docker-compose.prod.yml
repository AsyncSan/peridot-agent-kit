services:
  app:
    # PERIDOT_IMAGE is set in .env on the server.
    # Format: ghcr.io/<github-owner>/peridot-mcp-server:latest
    image: ${PERIDOT_IMAGE}
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    healthcheck:
      test: wget -qO- http://localhost:3001/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
